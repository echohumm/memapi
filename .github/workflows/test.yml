#file: noinspection UndefinedParamsPresent
name: Run tests
permissions:
  contents: read

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test on ${{ matrix.os }}+${{ matrix.rust }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable, nightly, 1.46.0, 1.56.0, 1.64]
        include:
          - rust: 1.46.0
            features: full
          - rust: 1.56.0
            features: full, dev
          - rust: 1.64
            features: full, dev
          - rust: stable
            features: full, dev
          - rust: nightly
            features: full_nightly, dev

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        id: install_rust
        uses: dtolnay/rust-toolchain@master
        continue-on-error: true
        with:
          toolchain: ${{ matrix.rust }}
          components: ${{ matrix.rust == 'nightly' && 'miri' || '' }}

      - name: Clean
        if: steps.install_rust.outcome == 'success'
        continue-on-error: true
        run: cargo +${{ matrix.rust }} clean

      - name: Miri Clean
        if: matrix.rust == 'nightly' && steps.install_rust.outcome == 'success'
        continue-on-error: true
        run: cargo +${{ matrix.rust }} miri clean

      - name: Run all tests
        if: steps.install_rust.outcome == 'success'
        continue-on-error: false
        run: cargo +${{ matrix.rust }} test --verbose --features ${{ matrix.features }}

      - name: Run Miri
        if: matrix.rust == 'nightly' && steps.install_rust.outcome == 'success'
        continue-on-error: false
        env:
          MIRIFLAGS: -Zmiri-permissive-provenance
        run: cargo +${{ matrix.rust }} miri test --verbose --features ${{ matrix.features }}

      - name: Run Clippy
        # other rust versions had weird clippy things, might check and try to fix them someday if
        #  they are real issues
        if: matrix.rust == 'nightly' || matrix.rust == 'stable'
        continue-on-error: false
        run: cargo +${{ matrix.rust }} clippy --features ${{ matrix.features }} -- -D unused_unsafe -D warnings

      - name: Run doc
        if: matrix.rust == 'nightly' || matrix.rust == 'stable'
        continue-on-error: false
        run: cargo +${{ matrix.rust }} doc --features ${{ matrix.features }}
