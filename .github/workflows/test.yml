name: Run tests
permissions:
  contents: read

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test on ${{ matrix.os }}+${{ matrix.rust }}
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_DIR: "target/${{ matrix.rust }}"
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        rust: [ stable, nightly, 1.46.0, 1.47.0, 1.49.0, 1.50.0, 1.52.0, 1.56.0, 1.57.0, 1.58.0, 1.61.0, 1.64.0, 1.71.0, 1.73.0, 1.75.0, 1.81.0, 1.83.0, 1.89.0 ]
        # TODO: make it work on these versions
        exclude:
          - os: macos-latest
            rust: 1.46.0
          - os: macos-latest
            rust: 1.47.0
          - os: macos-latest
            rust: 1.49.0
          - os: macos-latest
            rust: 1.50.0
          - os: macos-latest
            rust: 1.52.0
        include:
          - rust: 1.46.0
            features: "full"
          - rust: 1.47.0
            features: "full"
          - rust: 1.49.0
            features: "full"
          - rust: 1.50.0
            features: "full"
          - rust: 1.52.0
            features: "full, __dev"
          - rust: 1.56.0
            features: "full, __dev"
          - rust: 1.57.0
            features: "full, __dev"
          - rust: 1.58.0
            features: "full, __dev"
          - rust: 1.61.0
            features: "full, __dev"
          - rust: 1.64.0
            features: "full, __dev"
          - rust: 1.71.0
            features: "full, __dev"
          - rust: 1.73.0
            features: "full, __dev"
          - rust: 1.75.0
            features: "full, __dev"
          - rust: 1.81.0
            features: "full, __dev"
          - rust: 1.83.0
            features: "full, __dev"
          - rust: 1.89.0
            features: "full, __dev"
          - rust: stable
            features: "full, __dev"
          - rust: nightly
            features: "full_nightly, __dev"

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        id: install_rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        continue-on-error: true
        with:
          toolchain: ${{ matrix.rust }}
          components: ${{ matrix.rust == 'nightly' && 'clippy,miri' || 'clippy' }}

      - name: Clean
        if: steps.install_rust.outcome == 'success'
        continue-on-error: true
        run: cargo +${{ matrix.rust }} clean

      - name: Miri Clean
        if: matrix.rust == 'nightly' && steps.install_rust.outcome == 'success'
        continue-on-error: true
        run: cargo +${{ matrix.rust }} miri clean

      - name: Run all tests
        if: steps.install_rust.outcome == 'success'
        continue-on-error: false
        run: cargo +${{ matrix.rust }} test --verbose --features "${{ matrix.features }}"

      - name: Run Miri
        if: matrix.rust == 'nightly' && steps.install_rust.outcome == 'success'
        continue-on-error: false
        env:
          MIRIFLAGS: -Zmiri-permissive-provenance
        run: cargo +${{ matrix.rust }} miri test --verbose --features "${{ matrix.features }}"

      - name: Run Clippy
        # other rust versions had weird clippy things
        if: matrix.rust == 'nightly' || matrix.rust == 'stable'
        continue-on-error: false
        run: cargo +${{ matrix.rust }} clippy --features "${{ matrix.features }}" -- -D unused_unsafe -D warnings

      - name: Run doc
        if: matrix.rust == 'nightly' || matrix.rust == 'stable'
        continue-on-error: false
        run: cargo +${{ matrix.rust }} doc --features "${{ matrix.features }}"
