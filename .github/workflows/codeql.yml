name: "CodeQL Advanced"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '28 18 * * 5'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      # required for all workflows
      security-events: write
      # required to fetch internal or private CodeQL packs
      packages: read
      # only required for workflows in private repositories
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: c-cpp
            build-mode: manual
          - language: rust
            build-mode: none
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality

      - name: Run manual build steps
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          set -euxo pipefail
          
          # make sure the system C toolchain is available
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config
          
          # show some debug info
          which gcc
          gcc --version
          echo "repo tree (src/ffi):"
          ls -la src/ffi || true
          ls -la src/ffi/c || true
          
          # compile
          mkdir -p build
          if [ -f src/ffi/c/calloca.c ]; then
            gcc -c -fPIC -I. -o build/calloca.o src/ffi/c/calloca.c
          fi
          
          # also build with the build.rs
          cargo build --verbose --features stack_alloc

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
